name: Build App

# Builds SkylightCropping on Windows and macOS.
#   - Every push to main  -> lint + test + downloadable artifacts (Actions tab)
#   - Push a tag like v1.1 -> published GitHub Release with both binaries
#   - "Run workflow" button -> on-demand build (optionally creates a release)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Publish a release with this tag (e.g. v1.0). Leave blank to just build.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Tk + virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: xvfb-run -a pytest tests/ -v

  build-windows:
    needs: [lint, test]
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          prune-cache: false

      - name: Build executable
        shell: cmd
        run: build.bat

      - name: Smoke test executable
        shell: pwsh
        timeout-minutes: 2
        run: |
          $logFile = Join-Path $env:USERPROFILE ".skylight_cropping\app.log"
          $proc = Start-Process -FilePath "dist\SkylightCropping\SkylightCropping.exe" -PassThru
          $timeoutSeconds = 60
          $sw = [Diagnostics.Stopwatch]::StartNew()
          $windowFound = $false
          while ($sw.Elapsed.TotalSeconds -lt $timeoutSeconds) {
            $proc.Refresh()
            if ($proc.HasExited) {
              Write-Error "App exited unexpectedly after $($sw.Elapsed.TotalSeconds.ToString('0.0'))s (exit code $($proc.ExitCode))"
              if (Test-Path $logFile) { Write-Host "---- app.log ----"; Get-Content $logFile }
              exit 1
            }
            if ($proc.MainWindowHandle -ne 0) {
              $windowFound = $true
              break
            }
            Start-Sleep -Milliseconds 500
          }
          if (-not $windowFound) {
            Stop-Process -Id $proc.Id -Force
            Write-Error "App did not open a window within $timeoutSeconds seconds"
            if (Test-Path $logFile) { Write-Host "---- app.log ----"; Get-Content $logFile }
            exit 1
          }
          Write-Host "App window appeared after $($sw.Elapsed.TotalSeconds.ToString('0.0'))s"
          Stop-Process -Id $proc.Id -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SkylightCropping-windows
          path: dist/SkylightCropping/
          retention-days: 7

  build-mac:
    needs: [lint, test]
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          prune-cache: false

      - name: Build executable
        run: bash build.sh

      - name: Smoke test executable
        timeout-minutes: 2
        run: |
          ./dist/SkylightCropping &
          pid=$!
          sleep 10
          if ! kill -0 "$pid" 2>/dev/null; then
            echo "App exited unexpectedly within 10s" >&2
            exit 1
          fi
          echo "App still running after 10s"
          kill "$pid"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SkylightCropping-mac
          path: dist/SkylightCropping
          retention-days: 7

  publish:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: SkylightCropping-windows
          path: artifacts/windows/

      - uses: actions/download-artifact@v8
        with:
          name: SkylightCropping-mac
          path: artifacts/

      - name: Zip Windows build
        run: |
          cd artifacts/windows
          zip -r ../SkylightCropping-windows.zip .

      - name: Publish release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: >
          gh release create "$GITHUB_REF_NAME"
          artifacts/SkylightCropping-windows.zip
          artifacts/SkylightCropping
          --title "$GITHUB_REF_NAME"
          --generate-notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Publish release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        run: >
          gh release create "${{ inputs.release_tag }}"
          artifacts/SkylightCropping-windows.zip
          artifacts/SkylightCropping
          --title "${{ inputs.release_tag }}"
          --target "${{ github.sha }}"
          --generate-notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
