name: Build App

# Builds SkylightCropping on Windows and macOS.
#   - Every push to main  -> lint + test + downloadable artifacts (Actions tab)
#   - Push a tag like v1.1 -> published GitHub Release with both binaries
#   - "Run workflow" button -> on-demand build (optionally creates a release)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Publish a release with this tag (e.g. v1.0). Leave blank to just build.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'
          enable-cache: true

      - name: Install Tk + virtual display
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: xvfb-run -a pytest tests/ -v

  build-windows:
    needs: [lint, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'
          enable-cache: true

      - name: Build executable
        shell: cmd
        run: build.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SkylightCropping-windows
          path: dist/SkylightCropping.exe
          retention-days: 7

  build-mac:
    needs: [lint, test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.11'
          enable-cache: true

      - name: Build executable
        run: bash build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SkylightCropping-mac
          path: dist/SkylightCropping
          retention-days: 7

  publish:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: SkylightCropping-windows
          path: artifacts/

      - uses: actions/download-artifact@v8
        with:
          name: SkylightCropping-mac
          path: artifacts/

      - name: Publish release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: >
          gh release create "$GITHUB_REF_NAME"
          artifacts/SkylightCropping.exe
          artifacts/SkylightCropping
          --title "$GITHUB_REF_NAME"
          --generate-notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Publish release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        run: >
          gh release create "${{ inputs.release_tag }}"
          artifacts/SkylightCropping.exe
          artifacts/SkylightCropping
          --title "${{ inputs.release_tag }}"
          --target "${{ github.sha }}"
          --generate-notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
